services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-UTC}
    ports:
      - 8989:8989
    volumes:
      - ./sonarr_config:/config
      - ./downloads/complete:/media/complete
    restart: unless-stopped