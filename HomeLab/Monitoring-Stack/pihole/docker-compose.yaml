services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 8053:80
    environment:
      TZ=${TIMEZONE:-UTC}
      WEBPASSWORD: "ChangeMe_Strong_Password"
      ServerIP: 192.x.x.x 
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d 
