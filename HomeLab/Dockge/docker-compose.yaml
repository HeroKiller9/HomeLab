# This is Dockge
services:
  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped
    ports:
      - 5001:5001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data  
      - /home/${USER}/HomeLab:/home/${USER}/HomeLab 
    environment: 

      - DOCKGE_STACKS_DIR=/home/${USER}/HomeLab
